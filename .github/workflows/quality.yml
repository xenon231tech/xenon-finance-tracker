name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check HTML files
      run: |
        echo "✓ Checking HTML files..."
        find . -name "*.html" -type f | head -5
    
    - name: Check CSS files
      run: |
        echo "✓ Checking CSS files..."
        find . -name "*.css" -type f | head -5
    
    - name: Check JavaScript files
      run: |
        echo "✓ Checking JavaScript files..."
        find . -name "*.js" -type f | head -5
    
    - name: Check JSON files
      run: |
        echo "✓ Validating JSON files..."
        find . -name "*.json" -type f -exec python3 -m json.tool {} \; > /dev/null
    
    - name: Quality checks passed
      run: echo "✓ All quality checks passed!"
